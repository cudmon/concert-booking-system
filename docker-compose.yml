services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        API_URL: http://api:5000/api

    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0

    depends_on:
      - api

    ports:
      - "${WEB_PORT:-3000}:3000"

  migrate:
    build:
      context: .
      dockerfile: api/Dockerfile

    restart: "no"

    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-postgres}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}

    depends_on:
      postgres:
        condition: service_healthy

    command:
      [
        "node",
        "node_modules/typeorm/cli.js",
        "migration:run",
        "-d",
        "dist/database/datasource.js",
      ]

  api:
    build:
      context: .
      dockerfile: api/Dockerfile

    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-postgres}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-secret}

    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    expose:
      - 5000

  postgres:
    image: postgres:18-alpine

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-postgres}

    volumes:
      - postgres_data:/var/lib/postgresql

    expose:
      - "5432"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-postgres}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
